name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature for AI Foundation (`ns_t3af`)!

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature you'd like
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe the problem this would solve
      placeholder: I want to be able to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Providers / adapters
        - Public API (AiServiceInterface)
        - MCP server / tools / OAuth
        - AI Context (brand profiles)
        - AI Access & Roles
        - Credits / billing
        - Governance / telemetry
        - Dashboard / backend module
        - Child extension integration
        - Documentation
        - Other
    validations:
      required: true
