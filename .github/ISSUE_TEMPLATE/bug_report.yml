name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug in AI Foundation (`ns_t3af`)!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Open AI Foundation → Providers
        2. Configure provider '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: input
    id: t3af-version
    attributes:
      label: ns_t3af Version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: typo3-version
    attributes:
      label: TYPO3 Version
      placeholder: "13.4.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: "8.2.0"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Providers / adapters
        - MCP server / tools
        - AI Context (brand profiles)
        - AI Access & Roles
        - Credits / billing
        - Dashboard / backend module
        - AI Logs
        - Child extension integration
        - Other
    validations:
      required: false

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider (if relevant)
      options:
        - OpenAI
        - Anthropic Claude
        - Google Gemini
        - Azure OpenAI
        - Mistral
        - Ollama
        - OpenRouter
        - OpenAI-compatible / Custom
        - T3Planet Credits
        - N/A
    validations:
      required: false
