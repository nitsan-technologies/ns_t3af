name: core 12

on: [push, pull_request, workflow_dispatch]

jobs:
  tests:
    name: v12 / php${{ matrix.php }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure test runner is executable
        run: chmod +x Build/Scripts/runTests.sh

      - name: Install testing system
        run: Build/Scripts/runTests.sh -t 12 -p ${{ matrix.php }} -s composerInstallHighest

      - name: Lint PHP
        run: Build/Scripts/runTests.sh -t 12 -p ${{ matrix.php }} -s lint

      - if: matrix.php == '8.3'
        name: Validate code against CGL
        run: PHP_CS_FIXER_IGNORE_ENV=1 Build/Scripts/runTests.sh -t 12 -p ${{ matrix.php }} -s cgl -n

      - name: Unit Tests
        run: Build/Scripts/runTests.sh -t 12 -p ${{ matrix.php }} -s unit

      - name: Functional Tests
        run: Build/Scripts/runTests.sh -t 12 -p ${{ matrix.php }} -d sqlite -s functional
