name: documentation

on: [push, pull_request, workflow_dispatch]

jobs:
  docs:
    name: documentation
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure test runner is executable
        run: chmod +x Build/Scripts/runTests.sh

      - name: Render documentation
        run: Build/Scripts/runTests.sh -s docsGenerate -- --no-progress --minimal-test
