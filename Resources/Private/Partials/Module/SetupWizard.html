<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<script type="application/json" id="aiu-wizard-json-providers"><f:format.raw>{wizardProvidersJson}</f:format.raw></script>
<script type="application/json" id="aiu-wizard-json-catalog"><f:format.raw>{wizardCatalogJson}</f:format.raw></script>
<script type="application/json" id="aiu-wizard-json-extensions"><f:format.raw>{wizardExtensionsJson}</f:format.raw></script>
<script type="application/json" id="aiu-wizard-json-ui"><f:format.raw>{wizardUiJson}</f:format.raw></script>

<dialog id="aiu-setup-wizard-dialog"
        class="aiu-wizard__dialog"
        aria-labelledby="aiu-wizard-heading"
        aria-describedby="aiu-wizard-step-label"
        data-dashboard-uri="{dashboardUri}"
        data-aiu-page-id="{currentPageId}"
        data-credits-feature-available="{f:if(condition: '{creditsFeatureAvailable} == 1', then: '1', else: '0')}"
        data-extensions-available="{wizardExtensionsAvailable}"
        data-wizard-auto-open="{wizardAutoOpen}"
        data-wizard-resume-step="{wizardResumeStep}"
        data-wizard-max-step="{wizardMaxStep}">
    <div class="aiu-wizard">
        <header class="aiu-wizard__header">
            <div class="aiu-wizard__header-top">
                <p class="aiu-wizard__kicker small text-variant mb-2" id="aiu-wizard-step-label">
                    <span class="aiu-wizard__kicker-icon" aria-hidden="true">
                        <core:icon identifier="actions-star" size="small" alternativeMarkupIdentifier="inline" />
                    </span>
                    <span><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.kicker.before" /></span>
                    <span data-aiu-wizard-kicker-step="">1</span>
                    <span><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.kicker.after" /></span>
                </p>
                <button type="button" class="btn btn-default btn-sm aiu-wizard__close" data-aiu-wizard-close="" aria-label="{f:translate(key: 'LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.close')}">
                    <core:icon identifier="actions-close" size="small" alternativeMarkupIdentifier="inline" />
                </button>
            </div>
            <h2 class="h2 mb-3" id="aiu-wizard-heading">
                <span data-aiu-wizard-title><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step1.heading" /></span>
            </h2>
            <div class="aiu-wizard__stepper d-flex flex-wrap gap-1" role="tablist" aria-label="{f:translate(key: 'LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.stepper.label')}">
                <button type="button" class="btn btn-default btn-sm aiu-wizard__step-btn active is-active" role="tab" id="aiu-wizard-tab-1" data-aiu-wizard-goto="1" aria-selected="true" tabindex="0">
                    <span class="aiu-wizard__step-num" aria-hidden="true">1</span>
                    <span class="aiu-wizard__step-short"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.stepper.1.short" /></span>
                </button>
                <button type="button" class="btn btn-default btn-sm aiu-wizard__step-btn" role="tab" id="aiu-wizard-tab-2" data-aiu-wizard-goto="2" aria-selected="false" tabindex="-1">
                    <span class="aiu-wizard__step-num" aria-hidden="true">2</span>
                    <span class="aiu-wizard__step-short"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.stepper.2.short" /></span>
                </button>
                <button type="button" class="btn btn-default btn-sm aiu-wizard__step-btn" role="tab" id="aiu-wizard-tab-3" data-aiu-wizard-goto="3" aria-selected="false" tabindex="-1">
                    <span class="aiu-wizard__step-num" aria-hidden="true">3</span>
                    <span class="aiu-wizard__step-short"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.stepper.3.short" /></span>
                </button>
                <button type="button" class="btn btn-default btn-sm aiu-wizard__step-btn" role="tab" id="aiu-wizard-tab-4" data-aiu-wizard-goto="4" aria-selected="false" tabindex="-1">
                    <span class="aiu-wizard__step-num" aria-hidden="true">4</span>
                    <span class="aiu-wizard__step-short"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.stepper.4.short" /></span>
                </button>
                <f:if condition="{wizardExtensionsAvailable} == 1">
                    <button type="button" class="btn btn-default btn-sm aiu-wizard__step-btn" role="tab" id="aiu-wizard-tab-5" data-aiu-wizard-goto="5" aria-selected="false" tabindex="-1">
                        <span class="aiu-wizard__step-num" aria-hidden="true">5</span>
                        <span class="aiu-wizard__step-short"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.stepper.5.short" /></span>
                    </button>
                </f:if>
                <button type="button" class="btn btn-default btn-sm aiu-wizard__step-btn" role="tab" id="aiu-wizard-tab-6" data-aiu-wizard-goto="6" aria-selected="false" tabindex="-1">
                    <span class="aiu-wizard__step-num" aria-hidden="true">6</span>
                    <span class="aiu-wizard__step-short"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.stepper.6.short" /></span>
                </button>
                <button type="button" class="btn btn-default btn-sm aiu-wizard__step-btn" role="tab" id="aiu-wizard-tab-7" data-aiu-wizard-goto="7" aria-selected="false" tabindex="-1">
                    <span class="aiu-wizard__step-num" aria-hidden="true">7</span>
                    <span class="aiu-wizard__step-short"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.stepper.7.short" /></span>
                </button>
                <button type="button" class="btn btn-default btn-sm aiu-wizard__step-btn" role="tab" id="aiu-wizard-tab-8" data-aiu-wizard-goto="8" aria-selected="false" tabindex="-1">
                    <span class="aiu-wizard__step-num" aria-hidden="true">8</span>
                    <span class="aiu-wizard__step-short"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.stepper.8.short" /></span>
                </button>
            </div>
        </header>

        <div class="aiu-wizard__scroll">
            <section class="aiu-wizard__panel is-active"
                     data-aiu-wizard-step="1"
                     data-wizard-heading="{f:translate(key: 'LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step1.heading')}"
                     role="tabpanel"
                     aria-labelledby="aiu-wizard-tab-1"
                     id="aiu-wizard-panel-1">
                <div class="card card-size-small mb-1 w-100">
                    <div class="card-header">
                        <div class="card-icon">
                            <core:icon identifier="{moduleIconIdentifier}" size="medium" alternativeMarkupIdentifier="inline" />
                        </div>
                        <div class="card-header-body">
                            <div class="card-title mb-1"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step1.brand" /></div>
                            <p class="mb-0 text-variant"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step1.lead" /></p>
                        </div>
                    </div>
                </div>
                <h3 class="h4 mb-1"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step1.previewHeading" /></h3>
                <ul class="aiu-wizard__preview-list list-group mb-1">
                    <li class="aiu-wizard__preview-item list-group-item d-flex align-items-center gap-3">
                        <span class="flex-shrink-0" aria-hidden="true"><core:icon identifier="actions-key" size="small" alternativeMarkupIdentifier="inline" /></span>
                        <div class="aiu-wizard__preview-copy">
                            <div class="fw-semibold"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.preview.mode.title" /></div>
                            <div class="text-variant small"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.preview.mode.desc" /></div>
                        </div>
                        <span class="badge badge-success flex-shrink-0" aria-hidden="true"><core:icon identifier="actions-check" size="small" alternativeMarkupIdentifier="inline" /></span>
                    </li>
                    <f:if condition="{nsT3aiLoaded} == 1">
                        <li class="aiu-wizard__preview-item list-group-item d-flex align-items-center gap-3">
                            <span class="flex-shrink-0" aria-hidden="true"><core:icon identifier="actions-lightbulb-on" size="small" alternativeMarkupIdentifier="inline" /></span>
                            <div class="aiu-wizard__preview-copy">
                                <div class="fw-semibold"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.preview.extensions.title" /></div>
                                <div class="text-variant small"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.preview.extensions.desc" /></div>
                            </div>
                            <span class="badge badge-success flex-shrink-0" aria-hidden="true"><core:icon identifier="actions-check" size="small" alternativeMarkupIdentifier="inline" /></span>
                        </li>
                    </f:if>
                    <li class="aiu-wizard__preview-item list-group-item d-flex align-items-center gap-3">
                        <span class="flex-shrink-0" aria-hidden="true"><core:icon identifier="actions-link" size="small" alternativeMarkupIdentifier="inline" /></span>
                        <div class="aiu-wizard__preview-copy">
                            <div class="fw-semibold"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.preview.mcp.title" /></div>
                            <div class="text-variant small"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.preview.mcp.desc" /></div>
                        </div>
                        <span class="badge badge-success flex-shrink-0" aria-hidden="true"><core:icon identifier="actions-check" size="small" alternativeMarkupIdentifier="inline" /></span>
                    </li>
                </ul>
                <div class="callout callout-info mb-0" role="note">
                    <div class="callout-icon">
                        <core:icon identifier="actions-info" size="small" alternativeMarkupIdentifier="inline" />
                    </div>
                    <div class="callout-body">
                        <p class="mb-0"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step1.skipNote" /></p>
                    </div>
                </div>
                <footer class="aiu-wizard__footer module-footer py-0">
                    <div class="btn-toolbar w-100 align-items-center pt-3" role="toolbar">
                        <button type="button" class="btn btn-default aiu-wizard__skip" data-aiu-wizard-skip=""><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.skip" /></button>
                        <div class="btn-toolbar ms-auto" role="toolbar">
                            <button type="button" class="btn btn-primary aiu-wizard__primary d-inline-flex align-items-center gap-1" data-aiu-wizard-next="">
                                <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.start" />
                            </button>
                        </div>
                    </div>
                </footer>
            </section>

            <section class="aiu-wizard__panel"
                     data-aiu-wizard-step="2"
                     data-wizard-heading="{f:translate(key: 'LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.mainHeading')}"
                     role="tabpanel"
                     aria-labelledby="aiu-wizard-tab-2"
                     id="aiu-wizard-panel-2"
                     hidden="">
                <div class="aiu-mode aiu-wizard__mode" role="radiogroup" aria-label="{f:translate(key: 'LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.mainHeading')}">
                    <header class="aiu-mode__head aiu-wizard__mode-head">
                        <p class="aiu-mode__head-sub"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.sub" /></p>
                    </header>
                    <button type="button" class="aiu-mode__card aiu-mode__card--credits{f:if(condition: '{creditsFeatureAvailable} == 0', then: ' is-disabled')}" data-aiu-wizard-mode="credits" aria-pressed="false" aria-disabled="{f:if(condition: '{creditsFeatureAvailable} == 0', then: 'true', else: 'false')}">
                        <div class="aiu-mode__content">
                            <div class="aiu-mode__title-row">
                                <span class="aiu-mode__icon" aria-hidden="true">
                                    <core:icon identifier="actions-wallet" size="small" alternativeMarkupIdentifier="inline" />
                                </span>
                                <span class="aiu-mode__title"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.credits.title" /></span>
                                <f:if condition="{creditsFeatureAvailable} == 0">
                                    <f:then>
                                        <span class="aiu-pill badge badge-secondary ms-auto"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf:provider.mode.comingSoon" /></span>
                                    </f:then>
                                    <f:else>
                                        <span class="aiu-pill aiu-pill--recommended badge badge-warning"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.credits.badge" /></span>
                                    </f:else>
                                </f:if>
                            </div>
                            <p class="aiu-mode__desc"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.credits.desc" /></p>
                            <div class="aiu-mode__meta aiu-mode__meta--checks pb-2">
                                <span class="ok"><core:icon identifier="actions-check" size="small" alternativeMarkupIdentifier="inline" /> <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.credits.meta1" /></span>
                                <span class="ok"><core:icon identifier="actions-check" size="small" alternativeMarkupIdentifier="inline" /> <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.credits.meta2" /></span>
                                <span class="ok"><core:icon identifier="actions-check" size="small" alternativeMarkupIdentifier="inline" /> <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.credits.meta3" /></span>
                            </div>
                            <p class="aiu-mode__pricing"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.credits.pricing" /></p>
                        </div>
                    </button>
                    <button type="button" class="aiu-mode__card aiu-mode__card--ownkeys is-active" data-aiu-wizard-mode="ownkeys" aria-pressed="true">
                        <div class="aiu-mode__content">
                            <div class="aiu-mode__title-row">
                                <span class="aiu-mode__icon" aria-hidden="true">
                                    <core:icon identifier="actions-key" size="small" alternativeMarkupIdentifier="inline" />
                                </span>
                                <span class="aiu-mode__title"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.own.title" /></span>
                                <span class="aiu-pill aiu-pill--advanced"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.own.badge" /></span>
                            </div>
                            <p class="aiu-mode__desc"><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.own.desc" /></p>
                            <div class="aiu-mode__meta aiu-mode__meta--checks">
                                <span class="muted"><core:icon identifier="actions-check" size="small" alternativeMarkupIdentifier="inline" /> <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.own.meta1" /></span>
                                <span class="muted"><core:icon identifier="actions-check" size="small" alternativeMarkupIdentifier="inline" /> <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.own.meta2" /></span>
                                <span class="muted"><core:icon identifier="actions-check" size="small" alternativeMarkupIdentifier="inline" /> <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step2.own.meta3" /></span>
                            </div>
                        </div>
                    </button>
                </div>
                <footer class="aiu-wizard__footer module-footer py-0">
                    <div class="btn-toolbar w-100 align-items-center pt-3" role="toolbar">
                        <button type="button" class="btn btn-default aiu-wizard__skip" data-aiu-wizard-skip=""><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.skip" /></button>
                        <div class="btn-toolbar ms-auto" role="toolbar">
                            <div class="btn-group" role="group">
                                <button type="button" class="btn btn-default" data-aiu-wizard-prev=""><f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.back" /></button>
                                <button type="button" class="btn btn-primary aiu-wizard__primary d-inline-flex align-items-center gap-1" data-aiu-wizard-next="">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.continue" />
                                </button>
                            </div>
                        </div>
                    </div>
                </footer>
            </section>

            <section class="aiu-wizard__panel"
                     data-aiu-wizard-step="3"
                     data-wizard-heading="{f:translate(key: 'LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.mainHeading')}"
                     role="tabpanel"
                     aria-labelledby="aiu-wizard-tab-3"
                     id="aiu-wizard-panel-3"
                     hidden="">
                <div id="aiu-wizard-provider-own">
                    <p class="aiu-wizard__panel-lead aiu-wizard__panel-lead--step3 small">
                        <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.lead" />
                    </p>
                    <div id="aiu-wizard-provider-list-mount"
                         class="aiu-wizard__catalog-grid"
                         role="radiogroup"
                         aria-label="{f:translate(key: 'LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.pickHeading')}"></div>
                </div>
                <div id="aiu-wizard-provider-credits" hidden="">
                    <div class="callout callout-info mb-3" role="status">
                        <div class="callout-icon">
                            <core:icon identifier="actions-wallet" size="small" alternativeMarkupIdentifier="inline" />
                        </div>
                        <div class="callout-content">
                            <div class="callout-title">
                                <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsNoticeTitle" />
                            </div>
                            <div class="callout-body">
                                <p class="mb-0">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsNoticeText" />
                                </p>
                            </div>
                        </div>
                    </div>
                    <h3 class="h6 text-variant mb-2">
                        <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModelsHeading" />
                    </h3>
                    <div class="aiu-wizard__credits-models card-container mb-3" role="list">
                        <article class="card card-size-small aiu-wizard__model-card w-100" role="listitem">
                            <div class="card-body d-flex flex-column gap-2 py-3">
                            <div class="aiu-wizard__model-card-head">
                                <span class="aiu-wizard__model-icon" aria-hidden="true">
                                    <core:icon identifier="actions-star" size="small" alternativeMarkupIdentifier="inline" />
                                </span>
                                <span class="fw-semibold small">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModel.gpt4o.name" />
                                </span>
                            </div>
                            <div class="aiu-wizard__model-card-foot">
                                <span class="badge badge-default">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModel.gpt4o.badge" />
                                </span>
                                <span class="aiu-wizard__model-rate text-variant small">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModel.gpt4o.rate" />
                                </span>
                            </div>
                            </div>
                        </article>
                        <article class="card card-size-small aiu-wizard__model-card w-100" role="listitem">
                            <div class="card-body d-flex flex-column gap-2 py-3">
                            <div class="aiu-wizard__model-card-head">
                                <span class="aiu-wizard__model-icon" aria-hidden="true">
                                    <core:icon identifier="actions-star" size="small" alternativeMarkupIdentifier="inline" />
                                </span>
                                <span class="fw-semibold small">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModel.gpt4oMini.name" />
                                </span>
                            </div>
                            <div class="aiu-wizard__model-card-foot">
                                <span class="badge badge-default">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModel.gpt4oMini.badge" />
                                </span>
                                <span class="aiu-wizard__model-rate text-variant small">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModel.gpt4oMini.rate" />
                                </span>
                            </div>
                            </div>
                        </article>
                        <article class="card card-size-small aiu-wizard__model-card w-100" role="listitem">
                            <div class="card-body d-flex flex-column gap-2 py-3">
                            <div class="aiu-wizard__model-card-head">
                                <span class="aiu-wizard__model-icon" aria-hidden="true">
                                    <core:icon identifier="actions-star" size="small" alternativeMarkupIdentifier="inline" />
                                </span>
                                <span class="fw-semibold small">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModel.claude.name" />
                                </span>
                            </div>
                            <div class="aiu-wizard__model-card-foot">
                                <span class="badge badge-default">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModel.claude.badge" />
                                </span>
                                <span class="aiu-wizard__model-rate text-variant small">
                                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf:wizard.step3.creditsModel.claude.rate" />
                                </span>
                            </div>
                            </div>
                        </article>
                        <article class="card card-size-small aiu-wizard__model-card w-100" role="listitem">
                            <div class="card-body d-flex flex-column gap-2 py-3">
                            <div class="aiu-wizard__model-card-head">
                                <span class="aiu-wizard__model-icon" aria-hidden="true">
                                    <core:icon identifier="actions-star" size="small" alternativeMarkupIdentifier="inline" />
