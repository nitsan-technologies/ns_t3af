<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf" />

<div class="card card-size-small mb-0 w-100">
    <div class="card-header">
        <div class="card-header-body__top d-flex justify-content-between align-items-start gap-2">
            <h2 class="card-title mb-0"><f:translate key="{ll}:dashboard.creditEfficiency.title" default="Credit Efficiency" /></h2>
            <span class="card-subtitle mb-0"><f:translate key="{ll}:dashboard.creditEfficiency.subtitle" default="cost per operation" /></span>
        </div>
    </div>
    <div class="card-body d-flex flex-column gap-2">
        <f:for each="{creditEfficiency}" as="row">
            <div class="d-flex align-items-center justify-content-between gap-2">
                <span class="small text-truncate">{row.label}</span>
                <span class="fw-bold font-monospace">{row.creditsFormatted}</span>
            </div>
        </f:for>
        <f:if condition="{creditEfficiency -> f:count()} == 0">
            <p class="small text-variant mb-0"><f:translate key="{ll}:dashboard.creditEfficiency.empty" default="No feature usage in this period." /></p>
        </f:if>
        <p class="small text-variant mt-auto mb-0">
            <f:translate key="{ll}:dashboard.creditEfficiency.footer"
                         arguments="{0: avgCreditsPerRequest}"
                         default="%s cr/req avg" />
        </p>
    </div>
</div>
</html>
