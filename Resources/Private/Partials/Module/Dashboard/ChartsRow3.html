<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf" />

<div class="row g-3 mb-3">
    <div class="col-12 col-lg-4">
        <div class="card card-size-small mb-0 w-100 h-100">
            <div class="card-header">
                <h2 class="card-title mb-0"><f:translate key="{ll}:dashboard.chart.extensionUsage" /></h2>
            </div>
            <div class="card-body d-flex flex-column">
                <div class="aiu-panel__chart aiu-panel__chart--donut flex-grow-1">
                    <f:if condition="{creditsModeEnabled} == 1">
                        <f:then>
                            <f:render partial="Module/DashboardChart" arguments="{chartKey: 'ext-usage-credits', chartConfig: chartExtensionUsageCredits}" />
                        </f:then>
                        <f:else>
                            <f:render partial="Module/DashboardChart" arguments="{chartKey: 'ext-usage-own', chartConfig: chartExtensionUsageOwnKeys}" />
                        </f:else>
                    </f:if>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-4">
        <div class="card card-size-small mb-0 w-100 h-100">
            <div class="card-header">
                <h2 class="card-title mb-0">
                    <f:if condition="{creditsModeEnabled} == 1">
                        <f:then><f:translate key="{ll}:dashboard.chart.topExtensionsCredits" /></f:then>
                        <f:else><f:translate key="{ll}:dashboard.chart.topModels" default="Top Models by Tokens" /></f:else>
                    </f:if>
                </h2>
            </div>
            <div class="card-body d-flex flex-column">
                <div class="aiu-panel__chart aiu-panel__chart--medium flex-grow-1">
                    <f:if condition="{creditsModeEnabled} == 1">
                        <f:then>
                            <f:render partial="Module/DashboardChart" arguments="{chartKey: 'top-ext-cr', chartConfig: chartTopExtensionsCredits}" />
                        </f:then>
                        <f:else>
                            <f:render partial="Module/DashboardChart" arguments="{chartKey: 'top-models', chartConfig: chartTopModels}" />
                        </f:else>
                    </f:if>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-4">
        <f:if condition="{creditsModeEnabled} == 1">
            <f:then>
                <f:render partial="Module/Dashboard/CreditEfficiency" arguments="{creditEfficiency: creditEfficiency, avgCreditsPerRequest: dashboardAnalyticsCredits.avgCreditsPerRequest}" />
            </f:then>
            <f:else>
                <div class="card card-size-small mb-0 w-100 h-100">
                    <div class="card-header">
                        <h2 class="card-title mb-0"><f:translate key="{ll}:dashboard.chart.providerDistribution" /></h2>
                    </div>
                    <div class="card-body d-flex flex-column">
                        <div class="aiu-panel__chart aiu-panel__chart--donut flex-grow-1">
                            <f:render partial="Module/DashboardChart" arguments="{chartKey: 'provider-dist', chartConfig: chartProviderDistribution}" />
                        </div>
                        <f:if condition="{providerDistributionLegend -> f:count()} > 0">
                            <ul class="list-unstyled mt-3 mb-0 d-flex flex-column gap-2">
                                <f:for each="{providerDistributionLegend}" as="legendRow">
                                    <li class="d-flex align-items-center justify-content-between gap-2 small">
                                        <span>{legendRow.name}</span>
                                        <div class="d-flex align-items-center gap-2 flex-grow-1 justify-content-end">
                                            <div class="progress flex-grow-1" style="height: 6px; max-width: 4rem;">
                                                <div class="progress-bar" style="width: {legendRow.barPercent}%"></div>
                                            </div>
                                            <span class="fw-semibold">{legendRow.percent}%</span>
                                        </div>
                                    </li>
                                </f:for>
                            </ul>
                        </f:if>
                    </div>
                </div>
            </f:else>
        </f:if>
    </div>
</div>
</html>
