<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf" />

<div class="row g-3 mb-3">
    <div class="col-12 col-lg-8">
        <div class="card card-size-small mb-0 w-100 h-100">
            <div class="card-header">
                <div class="card-header-body__top d-flex justify-content-between align-items-start gap-2">
                    <h2 class="card-title mb-0"><f:translate key="{ll}:dashboard.chart.requestsTitle" /></h2>
                    <span class="card-subtitle mb-0">{dashboardPeriodRangeLabel}</span>
                </div>
            </div>
            <div class="card-body d-flex flex-column">
                <div class="aiu-panel__chart aiu-panel__chart--medium flex-grow-1">
                    <f:if condition="{creditsModeEnabled} == 1">
                        <f:then>
                            <f:render partial="Module/DashboardChart" arguments="{chartKey: 'req-sf-credits', chartConfig: chartRequestsSuccessFail}" />
                        </f:then>
                        <f:else>
                            <f:render partial="Module/DashboardChart" arguments="{chartKey: 'req-sf-own', chartConfig: chartRequests}" />
                        </f:else>
                    </f:if>
                </div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-4">
        <div class="card card-size-small mb-0 w-100 h-100">
            <div class="card-header">
                <div class="card-header-body__top d-flex justify-content-between align-items-start gap-2">
                    <h2 class="card-title mb-0"><f:translate key="{ll}:dashboard.chart.successRate" default="Success rate" /></h2>
                    <span class="card-subtitle mb-0">{dashboardPeriodRangeLabel}</span>
                </div>
            </div>
            <div class="card-body d-flex flex-column">
                <div class="aiu-panel__chart aiu-panel__chart--donut flex-grow-1">
                    <f:if condition="{creditsModeEnabled} == 1">
                        <f:then>
                            <f:render partial="Module/DashboardChart" arguments="{chartKey: 'success-credits', chartConfig: chartSuccessRateCredits}" />
                        </f:then>
                        <f:else>
                            <f:render partial="Module/DashboardChart" arguments="{chartKey: 'success-own', chartConfig: chartSuccessRateOwnKeys}" />
                        </f:else>
                    </f:if>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
