<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf" />
<f:variable name="balance" value="{creditsDashboard.balance}" />
<f:variable name="hero" value="{creditsHero}" />

<f:render partial="Module/Dashboard/ModeBanner" arguments="{
    modeLabelKey: 'dashboard.mode.credits.label',
    bannerModifier: 'aiu-dashboard-mode-banner--credits',
    iconIdentifier: 'actions-wallet',
    showActiveBadge: creditsModeActive,
    configuredCount: 0,
    manageHref: providersUri,
    manageLabelKey: 'dashboard.mode.credits.manage',
    showPeriodDropdown: 1,
    periodLabel: dashboardPeriodLabel,
    periodPresets: dashboardPeriodPresets,
    periodFromDate: dashboardPeriodFromDate,
    periodToDate: dashboardPeriodToDate,
    periodFormAction: dashboardUri,
    periodFormId: 'dashboard'
}" />

<div class="row g-3 mb-3">
    <div class="col-12 col-lg-4">
        <f:render partial="Module/Dashboard/CreditsHero" arguments="{hero: hero, creditsModeActive: creditsModeActive, providersUri: providersUri}" />
    </div>
    <div class="col-12 col-lg-5">
        <div class="card card-size-small mb-0 w-100 h-100">
            <div class="card-header">
                <div class="card-header-body">
                    <h2 class="card-title mb-0"><f:translate key="{ll}:dashboard.chart.creditsBurnTitle" /></h2>
                    <span class="card-subtitle"><f:translate key="{ll}:dashboard.chart.creditsBurnSubtitle" default="stacked by extension" /></span>
                </div>
            </div>
            <div class="card-body d-flex flex-column">
                <div class="aiu-panel__chart aiu-panel__chart--medium flex-grow-1">
                    <f:render partial="Module/DashboardChart" arguments="{chartKey: 'credits-stacked', chartConfig: chartCreditsStackedBurn}" />
                </div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-3">
        <f:render partial="Module/Dashboard/SpendByExtension" arguments="{
            extensionSpendRows: dashboardAnalyticsCredits.extensionSpendRows,
            creditProjection: creditProjection,
            providersUri: providersUri,
            periodDays: dashboardAnalyticsCredits.periodDays
        }" />
    </div>
</div>
</html>
