<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf" />

<f:render partial="Module/Dashboard/ModeBanner" arguments="{
    modeLabelKey: 'dashboard.mode.ownKeys.label',
    bannerModifier: 'aiu-dashboard-mode-banner--ownkeys',
    iconIdentifier: 'actions-key',
    showActiveBadge: 0,
    configuredCount: activeProviderCount,
    manageHref: providersUri,
    manageLabelKey: 'dashboard.mode.ownKeys.manage',
    showPeriodDropdown: 1,
    periodLabel: dashboardPeriodLabel,
    periodPresets: dashboardPeriodPresets,
    periodFromDate: dashboardPeriodFromDate,
    periodToDate: dashboardPeriodToDate,
    periodFormAction: dashboardUri,
    periodFormId: 'dashboard'
}" />

<div data-aiu-provider-list data-aiu-dashboard-provider-drawer data-aiu-page-id="{currentPageId}">
    <div class="card-container mb-3">
        <f:for each="{providerCards}" as="card">
            <f:render partial="Module/Dashboard/ProviderCard" arguments="{card: card}" />
        </f:for>
    </div>

    <aside class="aiu-drawer" data-aiu-drawer aria-hidden="true">
        <div class="aiu-drawer__panel" data-aiu-drawer-panel>
            <div class="aiu-empty">
                <f:translate key="{ll}:provider.drawer.loading" default="Loading…" />
            </div>
        </div>
    </aside>
</div>

<div class="row g-3 mb-3">
    <div class="col-12 col-lg-8">
        <div class="card card-size-small mb-0 w-100 h-100">
            <div class="card-header">
                <div class="card-header-body">
                    <h2 class="card-title mb-0"><f:translate key="{ll}:dashboard.chart.costTrend" default="API Cost Trend" /></h2>
                    <span class="card-subtitle">{dashboardPeriodRangeLabel}</span>
                </div>
            </div>
            <div class="card-body d-flex flex-column">
                <div class="aiu-panel__chart aiu-panel__chart--medium flex-grow-1">
                    <f:render partial="Module/DashboardChart" arguments="{chartKey: 'cost-trend', chartConfig: chartCostTrend}" />
                </div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-4">
        <f:render partial="Module/Dashboard/ApiSpendPanel" arguments="{apiSpendSummary: apiSpendSummary, providersUri: providersUri}" />
    </div>
</div>
</html>
