<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf" />

<div class="card card-size-small mb-0 w-100 h-100">
    <div class="card-header">
        <div class="card-header-body__top d-flex justify-content-between align-items-start gap-2">
            <h2 class="card-title mb-0"><f:translate key="{ll}:dashboard.chart.extensionSpend" /></h2>
            <span class="card-subtitle mb-0">{periodDays} days</span>
        </div>
    </div>
    <div class="card-body d-flex flex-column gap-2">
        <ul class="list-unstyled mb-0 d-flex flex-column gap-2 flex-grow-1">
            <f:for each="{extensionSpendRows}" as="row">
                <li>
                    <div class="d-flex justify-content-between small mb-1">
                        <span>{row.extensionKey}</span>
                        <span class="fw-semibold">{row.credits -> f:format.number(decimals: 0)} cr</span>
                    </div>
                    <div class="progress" style="height: 6px;">
                        <div class="progress-bar" style="width: {row.percent}%"></div>
                    </div>
                </li>
            </f:for>
        </ul>
        <f:if condition="{creditProjection.runOutDate} != ''">
            <div class="border-top pt-3 mt-2">
                <div class="small text-variant text-uppercase fw-semibold mb-1">
                    <f:translate key="{ll}:dashboard.projection.title" default="Credit projection" />
                </div>
                <p class="small text-variant mb-1">
                    <f:translate key="{ll}:dashboard.projection.runOut"
                                 arguments="{0: creditProjection.runOutDate, 1: creditProjection.dailyAvgFormatted}" />
                </p>
                <a href="{providersUri}" class="btn btn-default btn-sm flex-shrink-0">
                    <f:translate key="{ll}:dashboard.projection.buyMore" />
                </a>
            </div>
        </f:if>
    </div>
</div>
</html>
