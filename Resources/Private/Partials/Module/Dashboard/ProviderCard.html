<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf" />
<div class="card card-size-small aiu-provider-card aiu-provider-card--{card.statusKey}{f:if(condition: card.editUri, then: ' aiu-provider-card--linked position-relative')}">
    <f:if condition="{card.editUri}">
        <a href="#"
           class="aiu-provider-card__stretched-link stretched-link"
           data-aiu-drawer-trigger="edit"
           data-drawer-url="{card.editUri}"
           data-uid="{card.provider.uid}"
           aria-label="{f:translate(key: '{ll}:dashboard.provider.editAria', arguments: '{0: card.title}', default: 'Edit provider %s')}"></a>
    </f:if>
    <div class="card-header">
        <div class="card-icon">
            <f:switch expression="{card.statusKey}">
                <f:case value="active">
                    <core:icon identifier="actions-shield" size="small" alternativeMarkupIdentifier="inline" />
                </f:case>
                <f:case value="attention">
                    <core:icon identifier="actions-exclamation-triangle" size="small" alternativeMarkupIdentifier="inline" />
                </f:case>
                <f:defaultCase>
                    <core:icon identifier="actions-ban" size="small" alternativeMarkupIdentifier="inline" />
                </f:defaultCase>
            </f:switch>
        </div>
        <div class="card-header-body">
            <div class="card-header-body__top d-flex align-items-start justify-content-between gap-2">
                <h2 class="card-title text-truncate mb-0">{card.title}</h2>
                <f:switch expression="{card.statusKey}">
                    <f:case value="active">
                        <span class="badge badge-success flex-shrink-0">
                            <f:translate key="{ll}:dashboard.provider.status.active" default="Active" />
                        </span>
                    </f:case>
                    <f:case value="attention">
                        <span class="badge badge-warning flex-shrink-0">
                            <f:translate key="{ll}:dashboard.provider.status.attention" default="Needs attention" />
                        </span>
                    </f:case>
                    <f:defaultCase>
                        <span class="badge badge-default flex-shrink-0">
                            <f:translate key="{ll}:dashboard.provider.status.offline" default="Inactive" />
                        </span>
                    </f:defaultCase>
                </f:switch>
            </div>
            <span class="card-subtitle d-flex flex-wrap align-items-center gap-1 min-w-0">
                <f:if condition="{card.isDefault} == 1">
                    <span class="badge badge-default">
                        <f:translate key="{ll}:provider.default" />
                    </span>
                </f:if>
                <code class="badge badge-default">{card.modelId}</code>
            </span>
        </div>
    </div>
    <div class="card-body d-flex flex-column gap-2">
        <div class="row g-2">
            <div class="col-6">
                <div class="aiu-provider-card__metric">
                    <div class="text-variant">
                        <f:translate key="{ll}:dashboard.provider.periodCost" default="7d cost" />
                    </div>
                    <div class="fw-bold">{card.periodCostFormatted}</div>
                </div>
            </div>
            <div class="col-6">
                <div class="aiu-provider-card__metric aiu-provider-card__metric--errors{f:if(condition: card.errorRateHigh, then: ' is-high', else: '')}">
                    <div class="text-variant">
                        <f:translate key="{ll}:dashboard.provider.errorRate" default="errors" />
                    </div>
                    <div class="fw-bold">{card.errorRate}%</div>
                </div>
            </div>
        </div>
        <p class="small text-variant mb-0 mt-auto text-end">
            <f:translate key="{ll}:dashboard.provider.lastUsed" arguments="{0: card.lastUsedLabel}" default="last used: %s" />
        </p>
    </div>
</div>
</html>
