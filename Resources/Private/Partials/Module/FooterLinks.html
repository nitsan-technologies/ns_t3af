<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf" />

<div class="module-footer t3js-module-footer aiu-module-footer">
    <div class="aiu-module-footer__inner d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div class="footer-links-left">
            <span class="text-variant">
                <f:translate key="{ll}:module.footer.developedBy.prefix" />
                <a class="btn btn-link p-0"
                   href="{f:translate(key: '{ll}:module.footer.developedBy.link')}"
                   target="_blank"
                   rel="noopener noreferrer">
                    <f:translate key="{ll}:module.footer.developedBy.brand" />
                </a>
            </span>
        </div>
        <ul class="footer-links list-unstyled mb-0 d-flex flex-wrap align-items-center">
            <li>
                <a class="btn btn-link p-0"
                   href="{f:translate(key: '{ll}:module.footer.about.link')}"
                   target="_blank"
                   rel="noopener noreferrer">
                    <f:translate key="{ll}:module.footer.about" />
                </a>
            </li>
            <li>
                <a class="btn btn-link p-0"
                   href="{f:translate(key: '{ll}:module.footer.demo.link')}"
                   target="_blank"
                   rel="noopener noreferrer">
                    <f:translate key="{ll}:module.footer.demo" />
                </a>
            </li>
            <li>
                <a class="btn btn-link p-0"
                   href="{f:translate(key: '{ll}:module.footer.documentation.link')}"
                   target="_blank"
                   rel="noopener noreferrer">
                    <f:translate key="{ll}:module.footer.documentation" />
                </a>
            </li>
            <li>
                <a class="btn btn-link p-0"
                   href="{f:translate(key: '{ll}:module.footer.support.link')}"
                   target="_blank"
                   rel="noopener noreferrer">
                    <f:translate key="{ll}:module.footer.support" />
                </a>
            </li>
        </ul>
    </div>
</div>
</html>
