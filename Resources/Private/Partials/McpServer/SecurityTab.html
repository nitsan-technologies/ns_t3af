<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod.xlf" />

<div class="aiu-mcp-security">
    <div class="card mb-3">
        <div class="card-header">
            <h3 class="card-title mb-0"><f:translate key="{ll}:module.mcpServer.security.oauth.title" /></h3>
        </div>
        <div class="card-body">
            <form data-security-oauth-form>
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="aiu-mcp-enforce-pkce" name="enforcePkce" value="1"
                           {f:if(condition: '{mcpSecuritySettings.enforcePkce} == 1', then: 'checked="checked"')} />
                    <label class="form-check-label" for="aiu-mcp-enforce-pkce">
                        <f:translate key="{ll}:module.mcpServer.security.pkce" />
                    </label>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="aiu-mcp-security-scopes">
                        <f:translate key="{ll}:module.mcpServer.security.scopes.label" />
                    </label>
                    <input class="form-control" id="aiu-mcp-security-scopes" name="oauthDefaultScopes"
                           value="{mcpSecuritySettings.oauthDefaultScopes}" />
                </div>
                <div class="card-footer border-0 bg-transparent px-0 pb-0">
                    <button type="button" class="btn btn-primary" data-action="save-security-scopes">
                        <core:icon identifier="actions-check" size="small" />
                        <f:translate key="{ll}:module.mcpServer.action.saveSettings" />
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h3 class="card-title mb-0"><f:translate key="{ll}:module.mcpServer.security.ipAllowlist.title" /></h3>
        </div>
        <div class="card-body">
            <form class="row g-2 mb-3" data-ip-allowlist-form>
                <div class="col-md-4">
                    <input class="form-control" name="label" placeholder="{f:translate(key: '{ll}:module.mcpServer.security.ipAllowlist.label')}" />
                </div>
                <div class="col-md-4">
                    <input class="form-control" name="cidr" placeholder="{f:translate(key: '{ll}:module.mcpServer.security.ipAllowlist.cidr')}" />
                </div>
                <div class="col-md-4">
                    <button type="button" class="btn btn-primary" data-action="ip-allowlist-add">
                        <f:translate key="{ll}:module.mcpServer.security.ipAllowlist.add" />
                    </button>
                </div>
            </form>
            <div class="table-fit table-responsive">
                <table class="table table-striped table-hover align-middle mb-0" data-ip-allowlist-table>
                    <thead>
                        <tr>
                            <th scope="col"><f:translate key="{ll}:module.mcpServer.security.ipAllowlist.label" /></th>
                            <th scope="col"><f:translate key="{ll}:module.mcpServer.security.ipAllowlist.cidr" /></th>
                            <th scope="col"><f:translate key="{ll}:module.mcpServer.security.enabled" /></th>
                            <th scope="col" class="actions"><f:translate key="{ll}:module.mcpServer.table.action" /></th>
                        </tr>
                    </thead>
                    <tbody>
                        <f:if condition="{mcpSecuritySettings.ipAllowlist -> f:count()} == 0">
                            <tr><td colspan="4" class="aiu-empty"><f:translate key="{ll}:module.mcpServer.security.ipAllowlist.empty" /></td></tr>
                        </f:if>
                        <f:for each="{mcpSecuritySettings.ipAllowlist}" as="entry">
                            <tr data-ip-uid="{entry.uid}">
                                <td>{entry.label}</td>
                                <td><code>{entry.cidr}</code></td>
                                <td>
                                    <button type="button" class="btn btn-sm btn-default" data-action="ip-allowlist-toggle" data-uid="{entry.uid}" data-enabled="{f:if(condition: entry.enabled, then: '1', else: '0')}">
                                        <f:if condition="{entry.enabled}"><f:then><f:translate key="{ll}:module.mcpServer.security.enabledYes" /></f:then><f:else><f:translate key="{ll}:module.mcpServer.security.enabledNo" /></f:else></f:if>
                                    </button>
                                </td>
                                <td class="actions">
                                    <button type="button" class="btn btn-sm btn-danger" data-action="ip-allowlist-remove" data-uid="{entry.uid}">
                                        <f:translate key="{ll}:module.mcpServer.action.revoke" />
                                    </button>
                                </td>
                            </tr>
                        </f:for>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card aiu-mcp-security-mtls{f:if(condition: mcpMtlsFeatureAvailable, else: ' is-coming-soon')}" data-mcp-mtls-panel>
        <div class="card-header aiu-mcp-security-mtls__header">
            <div class="aiu-mcp-security-mtls__intro">
                <h3 class="card-title mb-0 aiu-mcp-security-mtls__title">
                    <span class="aiu-mcp-security-mtls__title-icon" aria-hidden="true">
                        <core:icon identifier="actions-shield" size="small" />
                    </span>
                    <f:translate key="{ll}:module.mcpServer.security.mtls.title" />
                </h3>
                <p class="aiu-mcp-security-mtls__lead text-variant small mb-0">
                    <f:translate key="{ll}:module.mcpServer.security.mtls.lead" />
                </p>
            </div>
            <div class="form-check form-switch aiu-mcp-security-mtls__switch mb-0">
                <input class="form-check-input"
                       type="checkbox"
                       role="switch"
                       id="aiu-mcp-mtls-enabled"
                       name="mtlsValidationEnabled"
                       value="1"
                       data-mcp-mtls-toggle
                       {f:if(condition: '{mcpSecuritySettings.mtlsValidationEnabled} == 1', then: 'checked="checked"')}
                       {f:if(condition: mcpMtlsFeatureAvailable, else: 'disabled="disabled"')} />
            </div>
        </div>
        <div class="card-body aiu-mcp-security-mtls__body{f:if(condition: '{mcpSecuritySettings.mtlsValidationEnabled} != 1', then: ' is-disabled')}"
             data-mcp-mtls-body
             aria-disabled="{f:if(condition: '{mcpSecuritySettings.mtlsValidationEnabled} == 1', then: 'false', else: 'true')}">
            <div class="callout callout-info aiu-mcp-security-mtls__info mb-4">
                <span class="aiu-mcp-security-mtls__info-icon" aria-hidden="true">
                    <core:icon identifier="actions-info" size="small" />
                </span>
                <p class="mb-0"><f:translate key="{ll}:module.mcpServer.security.mtls.info" /></p>
            </div>

            <div class="row g-3">
                <div class="col-lg-6">
                    <div class="aiu-mcp-security-mtls__box">
                        <h4 class="aiu-mcp-security-mtls__box-title h6 mb-2">
                            <f:translate key="{ll}:module.mcpServer.security.mtls.caTitle" />
                        </h4>
                        <p class="aiu-mcp-security-mtls__box-lead text-variant small mb-3">
                            <f:translate key="{ll}:module.mcpServer.security.mtls.caLead" />
                        </p>

                        <f:if condition="{mcpSecuritySettings.mtlsCaCertificate} != ''">
                            <f:then>
                                <div class="aiu-mcp-security-mtls__uploaded">
                                    <span class="aiu-mcp-security-mtls__uploaded-icon" aria-hidden="true">
                                        <core:icon identifier="actions-check" size="small" />
                                    </span>
                                    <span class="aiu-mcp-security-mtls__uploaded-label">
                                        <f:translate key="{ll}:module.mcpServer.security.mtls.uploaded" />
                                    </span>
                                    <button type="button"
                                            class="btn btn-link btn-sm aiu-mcp-security-mtls__remove"
                                            data-mcp-mtls-remove
                                            {f:if(condition: mcpMtlsFeatureAvailable, else: 'disabled="disabled"')}>
                                        <f:translate key="{ll}:module.mcpServer.security.mtls.remove" />
                                    </button>
                                </div>
                            </f:then>
                            <f:else>
                                <button type="button"
                                        class="btn btn-default aiu-mcp-security-mtls__upload"
                                        data-mcp-mtls-upload
                                        {f:if(condition: mcpMtlsFeatureAvailable, else: 'disabled="disabled"')}>
                                    <core:icon identifier="actions-plus" size="small" />
                                    <f:translate key="{ll}:module.mcpServer.security.mtls.upload" />
                                </button>
                            </f:else>
                        </f:if>

                        <input type="file"
                               class="visually-hidden"
                               id="aiu-mcp-mtls-file"
                               accept=".pem,.crt,.cer,text/plain"
                               data-mcp-mtls-file
                               {f:if(condition: mcpMtlsFeatureAvailable, else: 'disabled="disabled"')} />
                        <textarea class="visually-hidden"
                                  id="aiu-mcp-mtls-ca"
                                  name="mtlsCaCertificate"
                                  data-mcp-mtls-ca>{mcpSecuritySettings.mtlsCaCertificate}</textarea>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="aiu-mcp-security-mtls__box">
                        <h4 class="aiu-mcp-security-mtls__box-title h6 mb-3">
                            <f:translate key="{ll}:module.mcpServer.security.mtls.validationTitle" />
                        </h4>
                        <div class="aiu-mcp-security-mtls__checks">
                            <div class="form-check mb-2">
                                <input class="form-check-input"
                                       type="checkbox"
                                       id="aiu-mcp-mtls-ocsp"
                                       name="mtlsOcspCheck"
                                       value="1"
                                       checked="checked"
                                       disabled="disabled" />
                                <label class="form-check-label" for="aiu-mcp-mtls-ocsp">
                                    <f:translate key="{ll}:module.mcpServer.security.mtls.validationOcsp" />
                                </label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input"
                                       type="checkbox"
                                       id="aiu-mcp-mtls-ev"
                                       name="mtlsExtendedValidation"
                                       value="1"
                                       disabled="disabled" />
                                <label class="form-check-label" for="aiu-mcp-mtls-ev">
                                    <f:translate key="{ll}:module.mcpServer.security.mtls.validationEv" />
                                </label>
                            </div>
                            <div class="form-check mb-0">
                                <input class="form-check-input"
                                       type="checkbox"
                                       id="aiu-mcp-mtls-self-signed"
                                       name="mtlsAllowSelfSigned"
                                       value="1"
                                       disabled="disabled" />
                                <label class="form-check-label" for="aiu-mcp-mtls-self-signed">
                                    <f:translate key="{ll}:module.mcpServer.security.mtls.validationSelfSigned" />
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <f:if condition="{mcpMtlsFeatureAvailable}">
                <f:then>
                    <div class="aiu-mcp-security-mtls__actions mt-3">
                        <button type="button" class="btn btn-primary" data-action="save-mtls-settings">
                            <core:icon identifier="actions-check" size="small" />
                            <f:translate key="{ll}:module.mcpServer.action.saveSettings" />
                        </button>
                    </div>
                </f:then>
                <f:else>
                    <p class="aiu-mcp-security-mtls__soon text-variant small mb-0 mt-3">
                        <span class="badge badge-secondary me-1"><f:translate key="{ll}:module.mcpServer.security.mtls.comingSoon" /></span>
                        <f:translate key="{ll}:module.mcpServer.security.mtls.comingSoonLead" />
                    </p>
                </f:else>
            </f:if>
        </div>
    </div>
</div>
</html>
