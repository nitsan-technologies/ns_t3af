<html
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
    xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
    data-namespace-typo3-fluid="true"
>
<div class="card card-size-small"
     role="button"
     tabindex="0"
     data-aiu-features-card
     data-aiu-feature-id="{feature.id}"
     data-aiu-feature-name="{feature.name}"
     data-aiu-feature-subtitle="{feature.subtitle}"
     data-aiu-feature-extkey="{f:if(condition: feature.displayExtKey, then: feature.displayExtKey, else: feature.extKey)}"
     data-aiu-feature-config-extkey="{f:if(condition: feature.configExtKey, then: feature.configExtKey, else: feature.extKey)}"
     data-aiu-feature-description="{feature.description}"
     data-aiu-feature-settings-scope="{feature.settingsScope}">
    <div class="card-header">
        <div class="card-icon">
            <core:icon identifier="{feature.icon}" size="medium" alternativeMarkupIdentifier="inline" />
        </div>
        <div class="card-header-body">
            <div class="card-header-body__top d-flex align-items-center justify-content-between gap-2">
                <h2 class="card-title text-truncate mb-0">{feature.name}</h2>
                <f:if condition="{feature.extensionTitle}">
                    <span class="badge badge-default flex-shrink-0">{feature.extensionTitle}</span>
                </f:if>
            </div>
            <span class="card-subtitle">{feature.subtitle}</span>
        </div>
    </div>
    <div class="card-body">
        <p class="card-text mb-0">{feature.description}</p>
    </div>
    <div class="card-footer">
        <span class="btn btn-default">
            <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf:module.aiFeatures.configure" />
        </span>
    </div>
</div>
</html>
