<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Module" />

<f:section name="Content">
    <div class="aiu-providers">
        <f:render partial="Module/TabPageHeader" arguments="{_all}" />

        <f:be.infobox
            state="{f:constant(name: 'TYPO3\CMS\Fluid\ViewHelpers\Be\InfoboxViewHelper::STATE_INFO')}"
            title="{f:translate(key: 'LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf:module.siteStorage.pageRequiredTitle', default: 'Select a page first')}">
            <f:if condition="{siteStorageReason} == 'page_not_in_site'">
                <f:then>
                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf:module.siteStorage.pageNotInSite"
                                 default="The selected page is not part of a configured site. Choose a page that belongs to one of your sites." />
                </f:then>
                <f:else>
                    <f:translate key="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf:module.siteStorage.pageRequired"
                                 default="Choose a page in the page tree on the left. AI Providers and AI Features are stored per site at that site's root page." />
                </f:else>
            </f:if>
        </f:be.infobox>
    </div>
</f:section>
</html>
