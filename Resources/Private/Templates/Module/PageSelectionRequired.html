<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Module" />

<f:section name="Content">
    <f:variable name="ll" value="LLL:EXT:ns_t3af/Resources/Private/Language/locallang_mod_dashboard.xlf" />

    <div class="aiu-providers">
        <f:render partial="Module/TabPageHeader" arguments="{_all}" />

        <f:be.infobox
            state="{f:constant(name: 'TYPO3\CMS\Fluid\ViewHelpers\Be\InfoboxViewHelper::STATE_INFO')}"
            title="{f:translate(key: '{ll}:module.siteStorage.pageRequiredTitle')}">
            <f:if condition="{siteStorageReason} == 'page_not_in_site'">
                <f:then>
                    <f:translate key="{ll}:module.siteStorage.pageNotInSite" />
                </f:then>
                <f:else>
                    <f:translate key="{ll}:module.siteStorage.pageRequired" />
                </f:else>
            </f:if>
        </f:be.infobox>
    </div>
</f:section>
</html>
